<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="grad-coming-soon" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0b2545"/>
      <stop offset="50%" stop-color="#134074"/>
      <stop offset="100%" stop-color="#1d6a96"/>
    </linearGradient>
    <filter id="blur-coming-soon">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Background gradient -->
  <rect width="800" height="600" fill="url(#grad-coming-soon)"/>

  <!-- Light rays from surface -->
  <g filter="url(#blur-coming-soon)">
    <polygon points="166,0 218,0 245,600 139,600" fill="white" opacity="0.05"/>
    <polygon points="224,0 261,0 337,600 148,600" fill="white" opacity="0.05"/>
    <polygon points="118,0 139,0 212,600 45,600" fill="white" opacity="0.05"/>
    <polygon points="611,0 643,0 700,600 554,600" fill="white" opacity="0.05"/>
    <polygon points="439,0 497,0 560,600 377,600" fill="white" opacity="0.05"/>
  </g>

  <!-- Wave patterns -->
  <path d="M0 150 Q50 135 100 150 Q150 165 200 150 Q250 135 300 150 Q350 165 400 150 Q450 135 500 150 Q550 165 600 150 Q650 135 700 150 Q750 165 800 150 L800 600 L0 600 Z" fill="white" opacity="0.03"/>
  <path d="M0 258 Q50 235 100 258 Q150 281 200 258 Q250 235 300 258 Q350 281 400 258 Q450 235 500 258 Q550 281 600 258 Q650 235 700 258 Q750 281 800 258 L800 600 L0 600 Z" fill="white" opacity="0.05"/>
  <path d="M0 366 Q50 335 100 366 Q150 397 200 366 Q250 335 300 366 Q350 397 400 366 Q450 335 500 366 Q550 397 600 366 Q650 335 700 366 Q750 397 800 366 L800 600 L0 600 Z" fill="white" opacity="0.07"/>

  <!-- Bubbles -->
  <circle cx="192" cy="323" r="13" fill="white" opacity="0.07"/>
  <circle cx="603" cy="467" r="16" fill="white" opacity="0.10"/>
  <circle cx="743" cy="374" r="19" fill="white" opacity="0.08"/>
  <circle cx="163" cy="451" r="11" fill="white" opacity="0.06"/>
  <circle cx="447" cy="497" r="19" fill="white" opacity="0.05"/>
  <circle cx="293" cy="436" r="7" fill="white" opacity="0.09"/>
  <circle cx="516" cy="248" r="19" fill="white" opacity="0.07"/>
  <circle cx="365" cy="531" r="9" fill="white" opacity="0.13"/>
  <circle cx="407" cy="378" r="20" fill="white" opacity="0.13"/>

  <!-- Camera icon -->
  <g transform="translate(400, 260)" opacity="0.4">
    <rect x="-30" y="-20" width="60" height="40" rx="6" fill="none" stroke="white" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="12" fill="none" stroke="white" stroke-width="2.5"/>
    <rect x="-8" y="-25" width="16" height="8" rx="2" fill="none" stroke="white" stroke-width="2.5"/>
  </g>

  <!-- Text -->
  <text x="400" y="320" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="white" opacity="0.7" letter-spacing="2">PHOTO COMING SOON</text>
</svg>